name: automacao

on:
  workflow_dispatch: # Permite rodar manual
  schedule:
    # Lembrete: GitHub usa UTC (3 horas à frente de Brasília)
    
    # 1. Madrugada, Manhã e Tarde (Segunda a Sábado)
    # SP: 01:30, 02:30, 05:30, 06:30, 13:30, 14:30
    # UTC: 04:30, 05:30, 08:30, 09:30, 16:30, 17:30
    - cron: '30 4,5,8,9,16,17 * * 1-6'

    # 2. Noite (Segunda a Sábado) -> SP 21:30 vira UTC 00:30 do dia seguinte
    # Corresponde às noites de Segunda (2) até Sábado (0 = Domingo UTC)
    - cron: '30 0 * * 2,3,4,5,6,0'

    # 3. Noite (Diário) -> SP 22:30 vira UTC 01:30 do dia seguinte
    # Atende Segunda a Sábado + o seu horário de Domingo
    - cron: '30 1 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar Bibliotecas
        # Adicionado pytz para evitar o erro de ModuleNotFoundError
        run: |
          pip install playwright requests pytz
          
      - name: Cache do Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium

      - name: Instalar Navegador (Apenas se não houver cache)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Executar Script
        env:
          EMAIL_LOGIN: ${{ secrets.EMAIL_LOGIN }}
          SENHA_LOGIN: ${{ secrets.SENHA_LOGIN }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python main.py
