name: automacao

on:
  workflow_dispatch:
  schedule:
    # 1. Madrugada, Manhã e Tarde (Segunda a Sábado)
    # SP: 01:25, 02:25, 05:25, 06:25, 13:25, 14:25
    - cron: '25 4,5,8,9,16,17 * * 1-6'

    # 2. Noite (Segunda a Sábado) -> SP 21:25 vira UTC 00:25 do dia seguinte
    - cron: '25 0 * * 2,3,4,5,6,0'

    # 3. Noite (Todos os dias) -> SP 22:25 vira UTC 01:25 do dia seguinte
    - cron: '25 1 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar Bibliotecas
        run: pip install -r requirements.txt
          
      - name: Cache do Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium

      - name: Instalar Navegador
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Executar Script
        env:
          EMAIL_LOGIN: ${{ secrets.EMAIL_LOGIN }}
          SENHA_LOGIN: ${{ secrets.SENHA_LOGIN }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python main.py
